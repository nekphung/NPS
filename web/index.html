<!DOCTYPE html>
<html>
<head>
    <title>Trang Giới Thiệu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe); /* gradient xanh dương kiểu đẹp */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 18px;
            color: #0ef;
            background: linear-gradient(to right, #007bff, #00d4ff);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Chào mừng đến với Web Bán Hàng</h1>
        <p>Chúng tôi cung cấp các sản phẩm chất lượng cao với dịch vụ tận tâm. Hãy đăng nhập để trải nghiệm mua sắm tuyệt vời ngay hôm nay!</p>
        <a href="login" class="btn">Đăng Nhập</a>
    </div>
</body>
</html>
